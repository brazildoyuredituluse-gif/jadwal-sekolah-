<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — Papan Jadwal Hidup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .login-wrap{
    max-width:380px; margin:12vh auto; padding:0 16px;
  }
  .login-card{
    background:var(--panel); border:1px solid var(--panel-line); border-radius:14px; padding:28px 24px;
  }
  .login-card h1{font-family:'Space Grotesk',sans-serif; font-size:1.1rem; margin:0 0 4px;}
  .login-card p{font-size:.72rem; color:var(--ink-dim); margin:0 0 20px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:.68rem; color:var(--ink-dim); margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em;}
  .field input{
    width:100%; padding:9px 11px; background:#0f2038; border:1px solid var(--panel-line); border-radius:8px;
    color:var(--ink); font-family:'IBM Plex Mono',monospace; font-size:.85rem;
  }
  .field input:focus{outline:1px solid var(--amber); border-color:var(--amber);}
  button.submit{
    width:100%; padding:10px; background:var(--amber); color:#241505; border:none; border-radius:8px;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:.85rem; cursor:pointer; margin-top:6px;
  }
  button.submit:disabled{opacity:.6; cursor:progress;}
  .msg{font-size:.72rem; margin-top:12px; min-height:16px;}
  .msg.error{color:#f2b8c2;}
  .msg.ok{color:#8fd6a8;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Masuk Admin</h1>
    <p>Papan Jadwal Hidup · SMKN 1 Cilamaya</p>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required maxlength="50">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required maxlength="200">
      </div>
      <button type="submit" class="submit" id="submitBtn">Masuk</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
</div>
<script src="js/admin.js"></script>
</body>
</html>
